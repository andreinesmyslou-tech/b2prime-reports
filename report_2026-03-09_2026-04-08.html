<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2Prime Marketing Report</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e4e4e7;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .container { max-width: 1100px; margin: 0 auto; }

  /* Header */
  .report-header {
    text-align: center;
    margin-bottom: 48px;
  }
  .report-header h1 {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }
  .report-header .period {
    font-size: 15px;
    color: #71717a;
    font-weight: 400;
  }

  /* KPI Grid */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    margin-bottom: 48px;
  }
  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 560px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .kpi-card {
    background: #1a1b23;
    border: 1px solid #27272a;
    border-radius: 12px;
    padding: 24px 20px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .kpi-card:hover {
    border-color: #3f3f46;
  }
  .kpi-card .label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #71717a;
    margin-bottom: 12px;
  }
  .kpi-card .value {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    margin-bottom: 8px;
  }
  .kpi-card .cr {
    font-size: 13px;
    color: #a1a1aa;
  }
  .kpi-card .cr span {
    color: #22c55e;
    font-weight: 600;
  }

  /* Funnel bar */
  .funnel-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 48px;
  }
  .funnel-step {
    text-align: center;
    flex: 1;
    position: relative;
  }
  .funnel-step .bar {
    height: 6px;
    background: #3b82f6;
    border-radius: 3px;
    margin: 0 2px;
  }
  .funnel-step:nth-child(2) .bar { background: #6366f1; }
  .funnel-step:nth-child(3) .bar { background: #8b5cf6; }
  .funnel-step:nth-child(4) .bar { background: #a855f7; }
  .funnel-step:nth-child(5) .bar { background: #22c55e; }
  .funnel-step .step-label {
    font-size: 11px;
    color: #71717a;
    margin-top: 8px;
  }
  .funnel-step .step-value {
    font-size: 14px;
    font-weight: 600;
    color: #e4e4e7;
    margin-top: 2px;
  }
  .funnel-arrow {
    color: #3f3f46;
    font-size: 18px;
    margin: 0 4px;
    flex-shrink: 0;
  }

  /* Language toggle */
  .lang-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    background: #1a1b23;
    border: 1px solid #27272a;
    border-radius: 8px;
    overflow: hidden;
    z-index: 100;
  }
  .lang-btn {
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    color: #71717a;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lang-btn.active {
    background: #3b82f6;
    color: #fff;
  }
  .lang-btn:hover:not(.active) {
    color: #e4e4e7;
  }

  /* Footer */
  .report-footer {
    text-align: center;
    padding-top: 32px;
    border-top: 1px solid #27272a;
    color: #52525b;
    font-size: 12px;
  }
</style>
</head>
<body>
<!-- Language toggle -->
<div class="lang-toggle">
  <button class="lang-btn active" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('ru')">RU</button>
</div>

<div class="container">

    <div class="period">2026-03-09 - 2026-04-08</div>

  <!-- Block 1: KPI Cards -->
  <div class="kpi-grid">

    </div>
    <div class="kpi-card">
      <div class="label" data-en="Registrations" data-ru="&#1056;&#1077;&#1075;&#1080;&#1089;&#1090;&#1088;&#1072;&#1094;&#1080;&#1080;"></div>
      <div class="value">683</div>
      <div class="cr"><span>15.9%</span> <i data-en="of visits" data-ru="&#1086;&#1090; &#1074;&#1080;&#1079;&#1080;&#1090;&#1086;&#1074;"></i></div>
    </div>
    <div class="kpi-card">
      <div class="label" data-en="KYC Passed" data-ru="&#1055;&#1088;&#1086;&#1096;&#1083;&#1080; KYC"></div>
      <div class="value">72</div>
      <div class="cr"><span>10.5%</span> <i data-en="of registrations" data-ru="&#1086;&#1090; &#1088;&#1077;&#1075;&#1080;&#1089;&#1090;&#1088;&#1072;&#1094;&#1080;&#1081;"></i></div>
    </div>
    <div class="kpi-card">
      <div class="label" data-en="Deposited" data-ru="&#1042;&#1085;&#1077;&#1089;&#1083;&#1080; &#1076;&#1077;&#1087;&#1086;&#1079;&#1080;&#1090;"></div>

    <div class="kpi-card">

      <div class="value">15</div>
      <div class="cr"><span>88.2%</span> <i data-en="of deposited" data-ru="&#1086;&#1090; &#1076;&#1077;&#1087;&#1086;&#1079;&#1080;&#1090;&#1086;&#1074;"></i></div>
    </div>
  </div>

  <!-- Funnel visualization -->
  <div class="funnel-bar">
    <div class="funnel-step">
      <div class="bar" style="width:100%"></div>
      <div class="step-label" data-en="Visits" data-ru="&#1042;&#1080;&#1079;&#1080;&#1090;&#1099;"></div>
      <div class="step-value">4,284</div>
    </div>
    <div class="funnel-arrow">&#8594;</div>
    <div class="funnel-step">
      <div class="bar" style="width:100%"></div>
      <div class="step-label" data-en="Registrations" data-ru="&#1056;&#1077;&#1075;&#1080;&#1089;&#1090;&#1088;&#1072;&#1094;&#1080;&#1080;"></div>
      <div class="step-value">683</div>
    </div>
    <div class="funnel-arrow">&#8594;</div>
    <div class="funnel-step">
      <div class="bar" style="width:100%"></div>
      <div class="step-label" data-en="KYC Passed" data-ru="KYC"></div>
      <div class="step-value">72</div>
    </div>
    <div class="funnel-arrow">&#8594;</div>
    <div class="funnel-step">
      <div class="bar" style="width:100%"></div>
      <div class="step-label" data-en="Deposited" data-ru="&#1044;&#1077;&#1087;&#1086;&#1079;&#1080;&#1090;"></div>
      <div class="step-value">17</div>
    </div>
    <div class="funnel-arrow">&#8594;</div>
    <div class="funnel-step">
      <div class="bar" style="width:100%"></div>
      <div class="step-label" data-en="Active Traders" data-ru="&#1058;&#1088;&#1077;&#1081;&#1076;&#1077;&#1088;&#1099;"></div>
      <div class="step-value">15</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="report-footer">
    <span data-en="Generated" data-ru="&#1057;&#1075;&#1077;&#1085;&#1077;&#1088;&#1080;&#1088;&#1086;&#1074;&#1072;&#1085;&#1086;"></span> 2026-04-08 10:48 &middot; <span data-en="Source" data-ru="&#1048;&#1089;&#1090;&#1086;&#1095;&#1085;&#1080;&#1082;">Source</span>: Roistat API &middot; Project 295989
  </div>

</div>

<script>
function setLang(lang) {
  document.querySelectorAll('[data-en]').forEach(function(el) {
    el.textContent = el.getAttribute('data-' + lang);
  });
  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.textContent === lang.toUpperCase());
  });
  localStorage.setItem('b2prime_lang', lang);
}
(function() {
  var saved = localStorage.getItem('b2prime_lang') || 'en';
  setLang(saved);
})();
</script>
</body>
</html>
